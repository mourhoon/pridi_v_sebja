<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Приди в Себя - Когда есть свободное время?</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --cal1: #D50000;
    --cal2: #0B8043;
    --bg: #FAFAFA;
    --card: #FFFFFF;
    --text: #1A1A1A;
    --text-muted: #6B7280;
    --border: #E5E7EB;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --radius: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    margin: 0;
    overflow: hidden;
  }

  .header {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px;
    box-shadow: var(--shadow);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .header h1 {
    font-size: 1.15rem;
    font-weight: 700;
    letter-spacing: -0.01em;
    margin-bottom: 12px;
  }

  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 10px 20px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.88rem;
    font-weight: 600;
    color: var(--text);
  }

  .legend-dot {
    width: 12px;
    height: 12px;
    border-radius: 4px;
    flex-shrink: 0;
    box-shadow: 0 0 0 2px rgba(0,0,0,0.06);
  }

  .calendar-wrap {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    padding-top: var(--header-h, 80px);
  }

  .calendar-wrap iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }

  /* --- EDIT ZONE: Calendar names & colors --- */
  /* Change the text inside <span> tags below */
  /* Change --cal1 / --cal2 in :root to match your embed colors */

</style>
</head>
<body>

  <div class="header">
    <!-- ✏️ Change the title here -->
    <h1>Приди в Себя - Бронь отдельных комнат</h1>

    <div class="legend">
      <!-- ✏️ Change calendar names here -->
      <div class="legend-item">
        <span class="legend-dot" style="background: var(--cal1)"></span>
        <span>Красная комната</span>
      </div>
      <div class="legend-item">
        <span class="legend-dot" style="background: var(--cal2)"></span>
        <span>Большой стол У кухни</span>
      </div>
    </div>
  </div>

  <div class="calendar-wrap">
    <iframe
      src="https://calendar.google.com/calendar/embed?src=17d19e562e8c86c274d4c9e0f9bd4e2745e966b61123a3bd0cdce75718ee5cf3%40group.calendar.google.com&color=%23D50000&src=b9cbec36b27b41ae310010af7bc4577fb2219f6ec476ff4c357616353cd22d27%40group.calendar.google.com&color=%230B8043&hl=ru&wkst=2&mode=WEEK&showCalendars=0&showTitle=0&showPrint=0"
      loading="lazy"
    ></iframe>
  </div>

  <script>
    function setHeaderHeight() {
      const h = document.querySelector('.header').offsetHeight;
      document.querySelector('.calendar-wrap').style.setProperty('--header-h', h + 'px');
    }
    setHeaderHeight();
    window.addEventListener('resize', setHeaderHeight);
  </script>

</body>
</html>
